<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本地 AI 对话助手</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .chat-container { width: 100%; max-width: 600px; height: 85vh; background: #fff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        .chat-header { background: #007bff; color: #fff; padding: 16px 20px; font-size: 1.2rem; font-weight: bold; text-align: center; }
        .chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 15px; line-height: 1.5; word-wrap: break-word; font-size: 0.95rem; }
        .message.user { align-self: flex-end; background: #007bff; color: #fff; border-bottom-right-radius: 4px; }
        .message.ai { align-self: flex-start; background: #e9ecef; color: #333; border-bottom-left-radius: 4px; }
        .loading { font-size: 0.85rem; color: #888; align-self: flex-start; margin-top: -5px; display: none; }
        .input-area { display: flex; padding: 15px; background: #fff; border-top: 1px solid #ddd; }
        .input-area input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 20px; outline: none; font-size: 1rem; transition: border-color 0.3s; }
        .input-area input:focus { border-color: #007bff; }
        .input-area button { margin-left: 10px; padding: 0 20px; background: #007bff; color: white; border: none; border-radius: 20px; cursor: pointer; font-size: 1rem; transition: background 0.3s; }
        .input-area button:hover { background: #0056b3; }
        .input-area button:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">🤖 本地 AI 助手</div>
    <div class="chat-box" id="chat-box">
        <div class="message ai">你好！我是你的本地 AI 助手，有什么可以帮你的吗？</div>
    </div>
    <div class="loading" id="loading-indicator">AI 正在思考中...</div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="输入你的问题..." autocomplete="off">
        <button id="send-btn">发送</button>
    </div>
</div>

<script>
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const loadingIndicator = document.getElementById('loading-indicator');

    // 监听发送按钮点击
    sendBtn.addEventListener('click', sendMessage);

    // 监听回车键发送
    userInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            sendMessage();
        }
    });

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        // 1. 显示用户消息
        appendMessage(text, 'user');
        userInput.value = '';
        toggleInputState(false);

        // 2. 向 Python 后端发送请求
        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text })
            });

            if (!response.ok) throw new Error('网络响应异常');

            const data = await response.json();

            // 3. 显示 AI 回复
            appendMessage(data.reply, 'ai');
        } catch (error) {
            console.error('Error:', error);
            appendMessage('服务器连接失败，请检查后端是否运行。', 'ai');
        } finally {
            toggleInputState(true);
        }
    }

    // 辅助函数：在聊天框追加消息
    function appendMessage(text, sender) {
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('message', sender);
        msgDiv.textContent = text; // 使用 textContent 防范 XSS 攻击
        chatBox.appendChild(msgDiv);
        scrollToBottom();
    }

    // 辅助函数：滚动到底部
    function scrollToBottom() {
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // 辅助函数：控制输入框和 Loading 状态
    function toggleInputState(enable) {
        userInput.disabled = !enable;
        sendBtn.disabled = !enable;
        loadingIndicator.style.display = enable ? 'none' : 'block';
        if (enable) userInput.focus();
    }
</script>

</body>
</html>
